function decodeExam(){
  const bin=atob(encoded);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function publish(){
  publishBtn.disabled=true;
  statusEl.className="";
  statusEl.textContent="Publishing…";
  try{
    const response=await fetch("https://pagedrop.dev/api/v1/sites",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        html:decodeExam(),
        slug:fixedSlug,
        ogTitle:"Data Center Fiber Optics — Full Exam",
        ogDescription:"Interactive 130-question Data Center Fiber Optics and Network Infrastructure examination."
      })
    });
    const payload=await response.json().catch(()=>({}));
    if(!response.ok){
      // If the fixed slug somehow already exists, retry with a fresh one.
      if(response.status===409 || /slug|exists|unique/i.test(JSON.stringify(payload))){
        const randomSlug=fixedSlug+"-"+Math.random().toString(36).slice(2,8);
        const retry=await fetch("https://pagedrop.dev/api/v1/sites",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            html:decodeExam(),
            slug:randomSlug,
            ogTitle:"Data Center Fiber Optics — Full Exam",
            ogDescription:"Interactive 130-question Data Center Fiber Optics and Network Infrastructure examination."
          })
        });
        const retryPayload=await retry.json();
        if(!retry.ok) throw new Error(retryPayload.message||retryPayload.error||"Upload failed");
        return finish(retryPayload);
      }
      throw new Error(payload.message||payload.error||("Upload failed: HTTP "+response.status));
    }
    finish(payload);
  }catch(error){
    publishBtn.disabled=false;
    statusEl.className="bad";
    statusEl.textContent="Could not publish automatically.\n\n"+error.message+"\n\nCheck the internet connection and try again.";
  }
}

function finish(payload){
  const data=payload.data||payload;
  const url=data.url||expectedUrl;
  if(data.deleteToken) localStorage.setItem("fiberExamPageDropDeleteToken",data.deleteToken);
  localStorage.setItem("fiberExamPublicUrl",url);
  statusEl.className="ok";
  statusEl.textContent="Published successfully:\n"+url;
  openEl.href=url;
  openEl.hidden=false;
  publishBtn.textContent="Published";
  if(navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>{});
  setTimeout(()=>window.open(url,"_blank"),700);
}

publishBtn.addEventListener("click",publish);
</script>
</body>
</html>
